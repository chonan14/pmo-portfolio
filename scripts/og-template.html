<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        font-family: 'Yu Gothic', 'YuGothic', 'Meiryo', sans-serif;
      }
      .c {
        width: 1200px;
        height: 630px;
        box-sizing: border-box;
        background: #102a4c;
        color: #fff;
        padding: 90px 84px;
        position: relative;
      }
      .bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 1200px;
        height: 10px;
        background: #cba75a;
      }
      .ey {
        color: #cba75a;
        font-size: 30px;
        letter-spacing: 8px;
        font-weight: 700;
      }
      .nm {
        font-size: 92px;
        font-weight: 800;
        margin: 24px 0 0;
        letter-spacing: 6px;
      }
      .en {
        font-size: 30px;
        color: #aec4de;
        margin: 8px 0 0;
        letter-spacing: 6px;
      }
      .ti {
        font-size: 38px;
        color: #e6edf3;
        margin: 44px 0 0;
        font-weight: 700;
      }
      .sb {
        font-size: 25px;
        color: #7e9cc4;
        margin: 30px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="bar"></div>
      <div class="ey">PMO PORTFOLIO</div>
      <div class="nm">長南 貴則</div>
      <div class="en">CHONAN TAKANORI</div>
      <div class="ti">統括PMO ／ 戦略PMO ／ クライシスマネジメント</div>
      <div class="sb">PMO実務歴 約10年　・　IPA専門委員 ／ デジタル庁デジタル推進委員</div>
    </div>
  </body>
</html>
