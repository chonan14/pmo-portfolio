  - クライシスマネジメント
clientScale: 大企業
clientNameVisible: 株式会社NTTドコモ（本社）
role: 障害対応タスクフォース PMO（PM：営業本部長／取締役）
durationStart: '2012'
scope: 全社横断タスクフォース ／ 初動〜収束〜再発防止 ／ 総務省報告を視野
confidentialityLevel: Open
toolsMethods:
  - 意思決定プロセスの構造化
  - 対策会議ファシリテーション
  - 再発防止策の全社標準化
summary: ISPシステム障害によるメール誤配信という重大インシデントを、責任論が噴出しやすい炎上状況下で全社横断タスクフォースのPMOとして初動から収束まで統括。
challenge:
  - 「誰の責任か」の論争が会議を支配し、「何をすべきか」の意思決定が遅延するリスクがあった
  - 状況が刻々と変化する中、現場への情報連携の鮮度が低く二次混乱の懸念があった
  - 総務省報告も視野に入れた対外対応と社内統制を同時進行する必要があった
intervention:
  - 「責任論」ではなく「事実整理・顧客影響最小化・確定事項の迅速決定」に論点を強制的に集中
  - 対策会議のファシリテーションで意思決定プロセスを構造化し、判断速度を最大化
  - 現場への最新情報のリアルタイム連携・全社統制を維持し、二次災害を防止
resultsQuantitative:
  - 全社混乱を最短で鎮火し、二次障害の発生をゼロに抑制
  - 再発防止策の全社標準化を完遂
resultsQualitative:
  - 事実ベースの統制フレームワークを確立し、クライシス対応の組織知を構築
