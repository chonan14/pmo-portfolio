featured: true
industry:
  - 通信
  - ゼロ→1新概念導入
clientScale: 大企業
clientNameVisible: 株式会社NTTドコモ（本社）
role: 企画リードPM
durationStart: '2012'
scope: 影響顧客基盤 国内最大級 ／ 開発期間 12ヶ月 ／ 外部関係者 CGMコンテンツ事業者
confidentialityLevel: Open
toolsMethods:
  - 想い・社の利益を徹底可視化した稟議資料
