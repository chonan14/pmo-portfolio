title: 未成年者保護「利用者」概念の新規システム実装・全社業務構築
slug: minor-protection-system
status: Public
displayOrder: 88
featured: true
industry:
  - 通信
  - ゼロ→1新概念導入
clientScale: 大企業
clientNameVisible: 株式会社NTTドコモ（本社）
role: 企画リードPM
durationStart: '2012'
scope: 影響顧客基盤 約6,000万回線 ／ 開発期間 12ヶ月 ／ 外部関係者 CGMコンテンツ事業者
confidentialityLevel: Open
toolsMethods:
  - 想い・社の利益を徹底可視化した稟議資料
  - 経営層への起案・合意形成
  - 携帯電話不正利用防止法の制度知識
summary: 約款上は「契約者＝利用者」。だが実際の利用者が異なることは多い。その制度の立て付けを実社会に合わせて作り替え、約6,000万回線の顧客基盤に「利用者」という新概念をゼロから実装した、最も誇りに思う仕事です。
challenge:
  - 「契約者」と「実利用者」の乖離を、約6,000万回線の顧客基盤システムと全社業務へ作り込む必要があった
  - 顧客管理システムに紐づくソフトウェアは膨大で、影響を懸念する社内の広範な慎重論という逆風があった
  - 法務・システム・営業の利害が対立し、0→1の新概念で全社合意を得るのは極めて困難だった
intervention:
  - 子どもを守るため、そして将来必ず必要になるという確信のもと、想い・考え・社の利益を徹底的に可視化した資料で社内を説得
  - 携帯電話不正利用防止法の主管としての制度知識を土台に、経営層への起案・論点整理・意思決定支援を行い制度設計を完遂
  - RFP策定 → 開発・テスト統括 → 新業務フロー設計 → 全国展開通達・研修まで一体で推進
resultsQuantitative:
  - 約6,000万回線規模（案件全体）のシステム・業務改修を、重大障害なく完遂
  - 「利用者」を起点とした利用者保護が前進し、社内のパラダイムと後続の多数のサービスに波及
resultsQualitative:
  - 制度の立て付けを実社会に合わせて実装し、0→1で社の常識を変えた希少な実績
note: 約6,000万回線は当時の顧客基盤の規模であり、公表・一般に知られた水準です。私の担当は企画リードPM（制度設計〜全国展開・研修）です。
