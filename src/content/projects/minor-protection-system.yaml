  - 携帯電話不正利用防止法の制度知識
summary: 約款上は「契約者＝利用者」。だが実際の利用者が異なることは多い。その制度の立て付けを実社会に合わせて作り替え、国内最大級の顧客基盤に「利用者」という新概念をゼロから実装した、最も誇りに思う仕事です。
challenge:
  - 「契約者」と「実利用者」の乖離を、国内最大級の顧客基盤システムと全社業務へ作り込む必要があった
  - 顧客管理システムに紐づくソフトウェアは膨大で、影響を懸念する社内の広範な慎重論という逆風があった
  - 法務・システム・営業の利害が対立し、0→1の新概念で全社合意を得るのは極めて困難だった
intervention:
  - 子どもを守るため、そして将来必ず必要になるという確信のもと、想い・考え・社の利益を徹底的に可視化した資料で社内を説得
  - 携帯電話不正利用防止法の主管としての制度知識を土台に、経営層への起案・論点整理・意思決定支援を行い、制度設計の完遂に向けて全力を尽くした
  - RFP策定 → 開発・テスト統括 → 新業務フロー設計 → 全国展開通達・研修まで一体で推進
resultsQuantitative:
  - 国内最大級の顧客基盤（案件全体）のシステム・業務改修を、重大障害なく遂行するべく統制・支援を主導
  - 私の提案・制度設計・実装主導により、「利用者」起点の利用者保護が前進し、社内のパラダイムと後続サービスへの波及を促進
resultsQualitative:
  - 制度の立て付けを実社会に合わせて実装し、0→1の新概念導入を主導した、個人として誇りに思う実績
note: 記載の規模は案件全体（国内最大級の顧客基盤）のものです。私の担当は企画リードPM（制度設計〜全国展開・研修）です。
