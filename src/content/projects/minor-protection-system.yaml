summary: 未成年者保護を目的に「利用者」という新概念をゼロから制度設計し、約6,000万回線に影響する顧客基盤システムと全社業務に実装した0→1プロジェクト。
challenge:
  - 「利用者」概念が前例なく、制度・システム・業務を同時に0→1で設計する必要があった
  - 法務・システム・営業部門間の利害が対立し、全社合意形成が困難だった
  - 6,000万回線規模の改修のため、障害リスクを最小化した設計が不可欠だった
intervention:
  - 経営層への起案・論点整理・意思決定支援を行い、新概念の制度設計を完遂
  - 法務・システム・営業部門間の利害調整をリードし、全社合意形成を実現
  - RFP策定→テスト統括→新業務フロー設計→全国展開通達・研修実施を一体で推進
resultsQuantitative:
  - 6,000万回線規模のシステム・業務改修を障害ゼロで完遂
  - 新収益源の創出（保有データのマネタイズ化）・販促施策の精度向上を実現
resultsQualitative:
  - 0→1の新概念を制度・システム・運用の三位一体で実装した希少実績
