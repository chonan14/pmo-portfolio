summary: 大手事業会社のIT部門で、管理PMOとして複数プロジェクトの統制支援を提供。フリーランス単独でPMO機能を担い、約3年の継続契約に至った直近の実績。
challenge:
  - IT部門内の複数プロジェクトで情報が分散し、経営層への報告体制が整備されていなかった
  - プロジェクト横断での課題・リスクの優先順位付けと統制基盤の構築が求められていた
intervention:
  - 複数PJの進捗・課題・リスクを一元管理する統制基盤を構築・運用
  - 経営層向け月次・週次レポーティングの標準化と報告体制を整備
  - 関係部門間の認識統一・合意形成支援、業務プロセスの標準化・ドキュメント整備
resultsQuantitative:
  - 私がフリーランス単独でPMO機能を提供し、IT部門のプロジェクト管理品質向上に貢献
  - 約3年間の継続契約を実現（パフォーマンス評価による信頼獲得の証左）
resultsQualitative:
  - 私の統制基盤・レポーティング整備を通じて、経営層の意思決定速度向上に尽力
