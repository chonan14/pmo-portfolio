summary: 東日本大震災の災害対策本部の一員として、緊急時の特別な制度を作り続けた仕事。メリット・デメリット、法令の範囲を一つひとつ迅速に判断し、全国へ通達して、困っている人を助ける社会的責任を果たす一助となれたことを誇りに思います。
challenge:
  - 本人確認書類を津波で流された方に、どうやって携帯電話を届けるか——前例のない事態に、法規制上の対応方針が不明確だった
  - 被災状況が刻々と変化する中、経営層へのリアルタイムな情報連携が困難だった
  - 感情論・責任論が噴出しやすい有事で、事実ベースの意思決定プロセスを維持する必要があった
intervention:
  - 書類なしでの開通を認め、後日持参してもらう、持参できない場合は利用停止とする——この特例の流れを総務省連携のもと1日のうちに整理し、全国へ通達した
  - 全国フロント部門の被災・対応状況を収集・整理し、経営層へのリアルタイムレポーティング体制を構築
  - 「責任論」を排除し「事実整理・顧客影響最小化・確定事項の迅速決定」に論点を集中させるファシリテーションを徹底
resultsQuantitative:
  - 特例運用フローを迅速に設計・全国通達し、被災された方へ通信インフラを早期に届けるスキームを確立
  - 全社混乱を最小化し、二次被害ゼロの運用を設計・全国通達
resultsQualitative:
  - 有事において迅速に判断し、困っている人を助ける社会的責任を果たした
