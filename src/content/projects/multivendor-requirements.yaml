industry:
  - 通信
  - マルチベンダー統制
clientScale: 大企業
clientNameVisible: 株式会社NTTドコモ（本社）
role: サービス企画・開発 リードPMO（PM：事業部長／執行役員）
durationStart: '2019'
scope: 複数ベンダー関与 ／ 新規開発＋保守運用 ／ 要件定義最適化〜品質管理
confidentialityLevel: Open
toolsMethods:
  - 要件分離（新規開発／保守）
  - 事実(制約)と理想(To-Be)の切り分け
  - 優先順位の可視化
summary: 複数ベンダーが「新規開発要件」と「保守要件」を混在させ、情報の非対称性から認識齟齬が多発していた環境で、要件定義を最適化し統制フレームワークを確立。
challenge:
  - 「新規開発要件」と「保守要件」が混在し、ベンダー間・社内で認識齟齬が多発していた
  - 立場の異なるステークホルダーが情報を異なる粒度で解釈し、意思決定が遅滞していた
  - 優先順位の判断基準が不明確で、開発品質・納期双方にリスクが生じていた
intervention:
  - 「新規開発要件」と「保守要件」を明確に分離し、「事実(制約)」と「理想(To-Be)」を切り分けてドキュメント化
  - 全ステークホルダーが同じ情報を同じ粒度で認識できる情報基盤を構築・共有
  - 優先順位と決定根拠を可視化し、意思決定速度と品質管理精度を向上
resultsQuantitative:
  - ベンダー間の情報非対称性を解消し、認識齟齬に起因する手戻りを大幅削減
  - 要件定義の精緻化により開発品質の向上と納期遵守率の改善を達成
resultsQualitative:
  - マルチベンダーアジャイル環境での統制フレームワークを確立
