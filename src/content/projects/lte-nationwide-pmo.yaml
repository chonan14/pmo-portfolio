summary: 日本初のLTE商用サービス開始に伴う全国セールス部門の一斉対応を、国家インフラ規模で統括した最大案件。
challenge:
  - 超大規模・多拠点プロジェクトで、部門横断の情報一元化・進捗統制が困難だった
  - 遅延リスクが顕在化した場合のリカバリー基準・エスカレーション判断が不明確だった
  - 経営層と現場で情報粒度が乖離し、意思決定が遅滞するリスクがあった
intervention:
  - 全国展開計画を都道府県・拠点単位に分解し、週次・月次の進捗可視化体系を構築
  - 遅延兆候の早期検知指標を設定し、エスカレーション基準を明文化して全体共有
  - 経営層（取締役）と現場が同じ粒度で判断できるレポートフォーマットを設計・運用
resultsQuantitative:
  - 担当する全国セールス部門のLTEサービスインを計画どおり完遂（遅延なし）
  - 日本初のLTE商用サービスの全国展開を、遅延なく軌道に乗せた
resultsQualitative:
  - 日本初のLTE商用サービス開始に、セールス部門の統括PMOとして貢献
note: 記載の規模は案件全体のものです。私の担当は全国セールス部門の統括PMOです。
