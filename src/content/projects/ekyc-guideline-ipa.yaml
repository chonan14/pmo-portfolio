title: 官民連携・民間事業者向けデジタルKYC（eKYC）ガイドライン策定
slug: ekyc-guideline-ipa
status: Public
displayOrder: 80
featured: true
industry:
  - 官民連携
  - 金融・セキュリティ
clientScale: 官公庁・業界横断
clientNameVisible: IPA（情報処理推進機構）／ 経済産業省主導
role: 統括PMO（官民・業界横断の合意形成 ／ 企業間ブリッジ）
durationStart: '2021'
scope: 通信・金融・セキュリティ・法務など異業種・官民混在の多数関係者 ／ 論点整理〜公開
confidentialityLevel: Open
toolsMethods:
  - 会議体運営・論点整理
  - IAL/AAL等の概念整理
  - レビュー統合・版管理・宿題管理
summary: 経済産業省・IPA主導のもと、民間事業者向けデジタル本人確認（eKYC）ガイドラインを官民連携で策定。異業種・官民混在の多数関係者を束ねた高難度の合意形成プロジェクト。
challenge:
  - 通信・金融・セキュリティ・法務など各業界の立場・前提が異なり、共通認識形成が困難だった
  - 官側要請（規制・制度）と民側実装（技術・コスト）のギャップが大きく、実務適合性の担保が必要だった
  - デジタル庁との連携のもと、業界標準として機能するガイドラインに仕上げる必要があった
intervention:
  - 各社の立場差分を可視化し、決定可能な粒度へ収束させる会議体運営・論点整理を主導
  - 通信・金融・セキュリティ・法務企業間のブリッジを担い、記載内容の整合性・実務適合性を担保
  - 「身元確認・当人認証・保証レベル（IAL/AAL）」等の概念整理を主導し、共通理解を形成
  - レビュー統合・改訂管理・版管理・宿題管理を統括し、官側要請と民側実装のギャップを調整
resultsQuantitative:
  - 業界横断・官民混在のステークホルダーの合意形成を完遂し、ガイドラインを公開
  - 民間事業者向けeKYCの業界標準として普及し、国のデジタル政策形成に貢献
resultsQualitative:
  - 一企業の枠を超えた「業界全体への価値提供」を統括PMOとして実現
