title: 官民連携・民間事業者向けデジタルKYC（eKYC）ガイドライン策定
slug: ekyc-guideline-ipa
status: Public
displayOrder: 90
featured: true
industry:
  - 官民連携
  - 金融・セキュリティ
clientScale: 官公庁・業界横断
clientNameVisible: IPA（情報処理推進機構）／ 経済産業省主導
role: 統括PMO（官民・業界横断の合意形成 ／ 企業間ブリッジ）
durationStart: '2021'
scope: 通信・金融・セキュリティ・法務など異業種・官民混在の多数関係者 ／ 論点整理〜公開
confidentialityLevel: Open
toolsMethods:
  - 携帯電話不正利用防止法 主管としてのKYC実務知見
  - 会議体運営・論点整理（IAL/AAL の概念整理）
  - レビュー統合・版管理・宿題管理
summary: 経済産業省・IPA主導のもと、民間事業者向けデジタル本人確認（eKYC）ガイドラインを官民連携で策定。ネット上の犯罪防止とサービスの利便性向上に不可欠なKYCの“世の中の解像度”を上げることに寄与できた、誇りある仕事です。
challenge:
  - 通信・金融・セキュリティ・法務など各業界の立場・前提が異なり、共通認識の形成が困難だった
  - 官側要請（規制・制度）と民側実装（技術・コスト）のギャップが大きく、実務適合性の担保が必要だった
  - デジタル庁との連携のもと、業界標準として機能するガイドラインに仕上げる必要があった
intervention:
  - 携帯電話不正利用防止法の主管として対面・非対面チャネルのKYCを担当・熟知。その実務知見をもとに、オンラインKYCの有効性と実務面の有用性を説き、各社の論点を収束させた
  - 「身元確認・当人認証・保証レベル（IAL/AAL）」等の概念整理を主導し、通信・金融・セキュリティ・法務企業間のブリッジを担って整合性・実務適合性を担保
  - レビュー統合・改訂管理・版管理・宿題管理を統括し、官側要請と民側実装のギャップを調整
resultsQuantitative:
  - 業界横断・官民混在のステークホルダーの合意形成を完遂し、ガイドラインを公開
  - 民間事業者向けeKYCの業界標準ガイドライン策定に官民協働で参画し、普及に寄与
resultsQualitative:
  - 一企業の枠を超え、KYCに関する社会全体の理解と解像度を高める価値を提供
