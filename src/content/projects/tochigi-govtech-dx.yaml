summary: ある県の全自治体を対象に、XR観光・5G健康・防災・教育の4領域でDX実証実験を同時推進。民間技術を自治体に適用するビジネスモデル構築も担った。
challenge:
  - 行政の意思決定サイクルが民間と異なり、プロジェクト推進スピードの調整が難しかった
  - 4領域（観光・健康・防災・教育）を同時並行で管理し、進捗・課題を一元管理する必要があった
  - 実証実験の成果を自治体の予算・制度に乗せてビジネスモデルへ転換する設計が求められた
intervention:
  - 行政独特の意思決定プロセス・予算制約を踏まえたDX推進フレームワークを構築
  - 4領域の実証実験を並行管理するための一元管理体制（進捗・課題・リスク）を整備
  - 民間技術（XR・5G）を自治体DXに適用する官民協働モデルを設計・推進
resultsQuantitative:
  - 全自治体にわたる4領域の実証実験を、行政の意思決定サイクルと予算制約を踏まえて並行管理した
  - 自治体DXにおける民間PMO活用モデルの先行事例を組み立て、横展開できる形に整えた
resultsQualitative:
  - 官民協働での実証実験推進において、標準モデルの設計・導入を主導
