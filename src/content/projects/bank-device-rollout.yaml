  - 大規模導入
clientScale: 地方銀行
clientNameVisible: 地方銀行（東海エリア）
role: 導入統括PM
durationStart: '2016'
scope: 対象端末 2,000台 ／ 実施期間 2ヶ月 ／ セキュリティ要件 金融機関水準
confidentialityLevel: Open
toolsMethods:
  - 営業店単位の移行スケジュール逆算設計
  - キッティング工程管理
  - 多重確認工程
summary: 地方銀行の全行員向けスマートデバイス2,000台を、ゼロダウンタイム・金融機関水準のセキュリティ要件のもと、わずか2ヶ月で一斉更改した導入案件。
challenge:
  - 銀行業務を1秒も止められないゼロダウンタイム要件のもと、2,000台を2ヶ月で更改する必要があった
  - 行員個別のID/PW・VPN・業務アプリ設定など、複雑な個別要件を1台ずつ反映する必要があった
  - セキュリティインシデントが1件でも発生すれば全プロジェクトが即中断されるリスクがあった
intervention:
  - 営業店単位の緻密な移行スケジュールを逆算設計し、業務影響を完全に排除
  - 全端末のVPN・業務アプリ設定・行員個別要件を反映したキッティング工程を精緻に管理
  - 移行前・中・後の確認工程を多重化し、セキュリティインシデントを防ぐ統制を徹底
resultsQuantitative:
  - 対象端末2,000台の更改を、計画どおり2ヶ月で完遂（遅延なし）
  - 移行期間中、システム停止・セキュリティインシデントなく完了
  - 金融機関水準のセキュリティ・コンプライアンス要件を充足
resultsQualitative:
  - 厳格な金融要件下での短期一斉移行モデルを確立
